---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sealed-secrets
  namespace: flux-system
spec:
  interval: 1h0m0s
  chart:
    spec:
      chart: sealed-secrets
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: sealed-secrets
      version: "2.18.4"
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  releaseName: sealed-secrets-controller
  storageNamespace: flux-system
  targetNamespace: flux-system
