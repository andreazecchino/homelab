apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ca
  namespace: cert-manager
spec:
  isCA: false
  dnsNames:
    - "*.home.arpa"
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  revisionHistoryLimit: 1
  secretName: ca
  commonName: ca
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
