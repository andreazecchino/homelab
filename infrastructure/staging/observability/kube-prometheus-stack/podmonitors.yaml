---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: commafeed-db-metrics
  namespace: monitoring
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: commafeed-db
  namespaceSelector:
    matchNames:
      - commafeed
  podMetricsEndpoints:
    - port: metrics
      interval: 30s
      path: /metrics
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: linkding-db-metrics
  namespace: monitoring
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: linkding-db
  namespaceSelector:
    matchNames:
      - linkding
  podMetricsEndpoints:
    - port: metrics
      interval: 30s
      path: /metrics
