csi:
  attacherReplicaCount: 1
  provisionerReplicaCount: 1
  resizerReplicaCount: 1
  snapshotterReplicaCount: 1

defaultSettings:
  defaultDataPath: "/mnt/storage/longhorn"
  defaultDataLocality: "best-effort"
  guaranteedInstanceManagerCPU: 5 # Reduce from default 12%

preUpgradeChecker:
  jobEnabled: false # Disable this setting when installing Longhorn using Argo CD or other GitOps solutions

persistence:
  defaultClass: true
  defaultClassReplicaCount: 1 # Data replicas per volume (no redundancy); 2 replicas for 3+ nodes
  defaultFsType: ext4
  reclaimPolicy: Delete
  defaultMkfsParams: "-F" # Force mkfs to handle device busy issues

longhornManager:
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

longhornDriver:
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
