---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: kube-prometheus-stack
        namespace: monitoring
      version: "82.18.0"
  valuesFrom:
    - kind: ConfigMap
      name: kube-prometheus-stack-values
  install:
    crds: Create
    # remediation:
    #   retries: 3
  upgrade:
    crds: CreateReplace
    # cleanupOnFail: true
    # remediation:
    #   strategy: rollback
    #   retries: 3
