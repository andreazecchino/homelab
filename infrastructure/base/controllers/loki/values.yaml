loki:
  commonConfig:
    path_prefix: /var/loki
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
    - from: "2024-04-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: loki_index_
        period: 24h
  querier:
    max_concurrent: 2
  pattern_ingester:
    enabled: true
  limits_config:
    volume_enabled: true

deploymentMode: SingleBinary
singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    storageClass: longhorn
    size: 5Gi

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

minio:
  enabled: false

gateway:
  enabled: false

# monitoring:
#   selfMonitoring:
#     enabled: false
#     grafanaAgent:
#       installOperator: false
#   lokiCanary:
#     enabled: false

test:
  enabled: false

chunksCache:
  enabled: false

lokiCanary:
  enabled: false

resultsCache:
  enabled: false
