kubeProxyReplacement: true
k8sServiceHost: 192.168.178.40
k8sServicePort: 6443

hubble: # for observability
  enabled: true
  relay:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
  ui:
    enabled: true
    replicas: 1
  metrics:
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction

ipam:
  mode: kubernetes

l2announcements:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

operator:
  rollOutPods: true
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

rollOutCiliumPods: true

encryption:
  enabled: false

ingressController:
  enabled: false
  default: true
  loadbalancerMode: shared
  enforceHttps: true

gatewayAPI:
  enable: true
