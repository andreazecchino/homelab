apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: linkding-network-policy
  namespace: linkding
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/part-of: linkding
  # ingress:
  #   - fromEndpoints:
  #       - {}
  #   - fromEntities:
  #       - world
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
          rules:
            dns:
              - matchPattern: "*"
    # - toEndpoints:
    #     - {}
    # - toEntities:
    #     - world
    #   toPorts:
    #     - ports:
    #         - port: "443"
