apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: linkding-network-policy
  namespace: linkding
spec:
  endpointSelector: {}
  ingress:
    - fromCIDRSet:
        - cidr: 192.168.178.22/28
      toPorts:
        - ports:
            - port: "443"
        - ports:
            - port: "80"
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
          rules:
            dns:
              - matchPattern: "*"
    - toCIDRSet:
        - cidr: 192.168.178.22/28
      toPorts:
        - ports:
            - port: "443"
        - ports:
            - port: "80"
