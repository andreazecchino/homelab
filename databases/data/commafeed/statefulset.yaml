apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  serviceName: "postgres"
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      # securityContext:
      #   runAsUser: 1000
      #   runAsGroup: 3000
      #   fsGroup: 2000
      containers:
      - name: postgres
        image: postgres:18.3-alpine3.23
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
        envFrom:
          - configMapRef:
              name: postgres-configmap
          - secretRef:
              name: postgres-secrets
        volumeMounts:
          - name: postgres-volume
            mountPath: /var/lib/postgresql
        ports:
          - containerPort: 5432
            protocol: TCP
  volumeClaimTemplates:
  - metadata:
      name: postgres-volume
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: local-path
      resources:
        requests:
          storage: 1Gi
