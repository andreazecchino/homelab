apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: linkding-db
  labels:
    app: linkding-db
    app.kubernetes.io/component: database
    # those labels are ignored
    # app.kubernetes.io/name: linkding-db
    # app.kubernetes.io/version: "18.3"
    # app.kubernetes.io/part-of: linkding
spec:
  description: Postgres cluster for the linkding application
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-minimal-trixie
  instances: 1
  postgresql:
    parameters: # to handle low resources hardware
      checkpoint_timeout: "15min"
      max_wal_size: "1GB"
      min_wal_size: "512MB"
      synchronous_commit: "off"
  storage:
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
      storageClassName: longhorn
  bootstrap:
    initdb:
      database: linkding
      owner: linkding
      secret:
        name: linkding-db-secrets
  resources:
    requests:
      memory: "256Mi"
      cpu: "500m"
    limits:
      memory: "384Mi"
      cpu: "1000m"
  managed:
    services:
      disabledDefaultServices: ["ro", "r"]
      additional:
        - selectorType: rw
          serviceTemplate:
            metadata:
              name: linkding-db
              labels:
                app: linkding-db
                app.kubernetes.io/part-of: linkding
                # those labels are ignored
                # app.kubernetes.io/name: linkding-db
                # app.kubernetes.io/component: svc
            spec:
              type: ClusterIP
