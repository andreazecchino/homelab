apiVersion: apps/v1
kind: Deployment
metadata:
  name: commafeed
  labels:
    app: commafeed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: commafeed
  template:
    metadata:
      labels:
        app: commafeed
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
      containers:
        - name: commafeed
          image: athou/commafeed:7.0.0-postgresql
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
          envFrom:
            - configMapRef:
                name: commafeed-configmap
            - secretRef:
                name: commafeed-secrets
          ports:
            - containerPort: 8082
              protocol: TCP
      restartPolicy: Always
