# Secrets created with:
# kubectl create secret generic commafeed-secrets \
# --from-literal=QUARKUS_HTTP_AUTH_SESSION_ENCRYPTION_KEY=<value>
# or manifest:
# apiVersion: v1
# kind: Secret
# type: Opaque
# metadata:
#   name: commafeed-secrets
# data:
#   QUARKUS_HTTP_AUTH_SESSION_ENCRYPTION_KEY: <value>
