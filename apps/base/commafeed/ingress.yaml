apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: commafeed-ingress
  labels:
    app: commafeed
spec:
  tls:
  - hosts:
    - commafeed.homelab.local
    secretName: commafeed-cert
  rules:
  - host: commafeed.homelab.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: commafeed
            port:
              number: 8082
