---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 17m
  retryInterval: 2m
  timeout: 3m
  sourceRef:
    kind: GitRepository
    name: podinfo
  path: ./infrastructure/base/controllers
  wait: true
  prune: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: configurations
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure
  interval: 19m
  retryInterval: 2m
  timeout: 3m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/base/configs
  prune: true
