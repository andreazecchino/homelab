apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 2m
  timeout: 3m
  sourceRef:
    kind: GitRepository
    name: source
  path: ./cluster/data
  prune: true
  wait: true
