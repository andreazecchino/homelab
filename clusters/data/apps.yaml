---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  dependsOn:
    - name: databases
  interval: 13m
  retryInterval: 2m
  timeout: 3m
  sourceRef:
    kind: GitRepository
    name: source
  path: ./apps/base
  prune: true
  wait: true
