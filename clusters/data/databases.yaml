---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: databases
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure
  interval: 15m
  retryInterval: 2m
  timeout: 3m
  sourceRef:
    kind: GitRepository
    name: source
  path: ./databases/data
  prune: true
  wait: true
