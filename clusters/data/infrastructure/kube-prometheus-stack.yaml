---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  dependsOn:
    - name: sealed-secrets
  interval: 30m
  retryInterval: 2m
  timeout: 3m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/base/controllers/kube-prometheus-stack
  wait: true
  prune: true
