---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  dependsOn:
    - name: sealed-secrets
  interval: 30m
  retryInterval: 2m
  timeout: 3m
  sourceRef:
    kind: GitRepository
    name: source
  path: ./infrastructure/base/controllers/cert-manager
  wait: true
  prune: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-config
  namespace: flux-system
spec:
  dependsOn:
    - name: cert-manager
  interval: 30m
  retryInterval: 2m
  timeout: 3m
  sourceRef:
    kind: GitRepository
    name: source
  path: ./infrastructure/base/configs/cert-manager
  wait: true
  prune: true
